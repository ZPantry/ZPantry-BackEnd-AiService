services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zpantry-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zpantry}
      POSTGRES_USER: ${POSTGRES_USER:-zpantry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zpantry} -d ${POSTGRES_DB:-zpantry}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zpantry-backend
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://127.0.0.1:8000}
    ports:
      - "8080:8080"
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/swagger/v1/swagger.json'); urllib.request.urlopen('http://localhost:8000/ai/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
